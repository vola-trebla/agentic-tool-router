<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Tool Router</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            frog: { 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 900: '#052e16' },
          },
        },
      },
    };
  </script>
  <style>
    body { background: #0a0a0a; }
    .prose h1, .prose h2, .prose h3 { color: #e2e8f0; }
    .prose strong { color: #4ade80; }
    .prose li { color: #cbd5e1; }
    .prose p { color: #cbd5e1; }
    .prose code { color: #fbbf24; background: #1e293b; padding: 2px 6px; border-radius: 4px; }
    .loader { width: 24px; height: 24px; border: 3px solid #22c55e33; border-top-color: #22c55e; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body class="min-h-screen text-gray-100 flex flex-col">
  <!-- Header -->
  <header class="border-b border-gray-800 px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center gap-3">
      <span class="text-3xl"></span>
      <div>
        <h1 class="text-xl font-bold text-frog-400">Agentic Tool Router</h1>
        <p class="text-xs text-gray-500">ReAct agent powered by Gemini + NASA APIs</p>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 px-6 py-8 overflow-y-auto">
    <div id="results" class="max-w-3xl mx-auto space-y-6"></div>
  </main>

  <!-- Input -->
  <footer class="border-t border-gray-800 px-6 py-4">
    <form id="askForm" class="max-w-3xl mx-auto flex gap-3">
      <input
        id="questionInput"
        type="text"
        placeholder="Ask about space... e.g. 'Is anything dangerous near Earth today?'"
        autocomplete="off"
        class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:border-frog-500 focus:ring-1 focus:ring-frog-500 transition"
      />
      <button
        type="submit"
        id="submitBtn"
        class="bg-frog-600 hover:bg-frog-500 text-white font-semibold px-6 py-3 rounded-xl transition flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span>🐸</span> Ask
      </button>
    </form>
  </footer>

  <script>
    const form = document.getElementById('askForm');
    const input = document.getElementById('questionInput');
    const submitBtn = document.getElementById('submitBtn');
    const results = document.getElementById('results');

    const STEP_ICONS = { think: '🧠', act: '⚙️', observe: '👁️' };
    const STEP_LABELS = { think: 'Think', act: 'Act', observe: 'Observe' };
    const STEP_COLORS = {
      think: 'border-purple-500/30 bg-purple-500/5',
      act: 'border-frog-500/30 bg-frog-500/5',
      observe: 'border-blue-500/30 bg-blue-500/5',
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      submitBtn.disabled = true;
      input.disabled = true;

      // Add question bubble
      const questionEl = document.createElement('div');
      questionEl.className = 'fade-in flex justify-end';
      questionEl.innerHTML = `
        <div class="bg-frog-600/20 border border-frog-500/30 rounded-xl px-4 py-3 max-w-md">
          <p class="text-sm text-frog-400">${escapeHtml(question)}</p>
        </div>
      `;
      results.appendChild(questionEl);

      // Add loader
      const loaderEl = document.createElement('div');
      loaderEl.className = 'fade-in flex items-center gap-3 text-gray-500 text-sm';
      loaderEl.innerHTML = `<div class="loader"></div> Thinking...`;
      results.appendChild(loaderEl);

      results.scrollIntoView({ behavior: 'smooth', block: 'end' });

      try {
        const startTime = Date.now();
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

        loaderEl.remove();

        // Answer card
        const card = document.createElement('div');
        card.className = 'fade-in space-y-4';
        card.innerHTML = `
          <!-- Answer -->
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
            <div class="prose prose-sm max-w-none">
              ${marked.parse(data.answer || 'No answer received.')}
            </div>
          </div>

          <!-- Meta -->
          <div class="flex flex-wrap gap-3 text-xs text-gray-500">
            <span>⏱️ ${elapsed}s</span>
            ${(data.toolsUsed || []).map(t => `<span class="bg-gray-800 px-2 py-1 rounded-md">🔧 ${escapeHtml(t)}</span>`).join('')}
          </div>

          <!-- Reasoning trace -->
          <details class="group">
            <summary class="cursor-pointer text-xs text-gray-500 hover:text-gray-300 transition select-none">
              ▶ Reasoning trace (${(data.steps || []).length} steps)
            </summary>
            <div class="mt-3 space-y-2">
              ${(data.steps || []).map(step => `
                <div class="border-l-2 ${STEP_COLORS[step.type] || ''} rounded-r-lg px-4 py-2">
                  <div class="flex items-center gap-2 text-xs font-medium text-gray-400 mb-1">
                    <span>${STEP_ICONS[step.type] || '•'}</span>
                    <span>${STEP_LABELS[step.type] || step.type}</span>
                    ${step.toolName ? `<span class="text-frog-400">[${escapeHtml(step.toolName)}]</span>` : ''}
                  </div>
                  <p class="text-xs text-gray-500 break-all whitespace-pre-wrap">${escapeHtml(step.content.slice(0, 500))}</p>
                </div>
              `).join('')}
            </div>
          </details>
        `;
        results.appendChild(card);
      } catch (err) {
        loaderEl.remove();
        const errorEl = document.createElement('div');
        errorEl.className = 'fade-in bg-red-900/20 border border-red-500/30 rounded-xl px-4 py-3 text-sm text-red-400';
        errorEl.textContent = `Error: ${err.message}`;
        results.appendChild(errorEl);
      }

      submitBtn.disabled = false;
      input.disabled = false;
      input.value = '';
      input.focus();
      results.scrollIntoView({ behavior: 'smooth', block: 'end' });
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    input.focus();
  </script>
</body>
</html>
